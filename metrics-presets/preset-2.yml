schema: v1
name: saitenntaisei
description: My metrics presets 2
author: H1rono
with:
  base: ""
  config_timezone: Asia/Tokyo
  config_display: large
  config_order: isocalendar, languages, activity, achievements
  # plugin_habits is disabled: GitHub stopped returning `payload.commits`
  # on `/users/{login}/events` PushEvents, so the plugin crashes at
  # habits/index.mjs:51. Re-enable once upstream switches data source.
  # https://github.com/lowlighter/metrics/blob/master/source/plugins/habits/README.md
  # plugin_habits: yes
  # plugin_habits_days: 30
  # https://github.com/lowlighter/metrics/blob/master/source/plugins/isocalendar/README.md
  plugin_isocalendar: yes
  plugin_isocalendar_duration: full-year
  # https://github.com/lowlighter/metrics/blob/master/source/plugins/languages/README.md
  # indepth mode clones every non-skipped repo on the runner to analyze
  # commit-level line counts. This adds several minutes to the workflow
  # but gives accurate "lines added/removed per language" data that the
  # GraphQL-only mode cannot derive.
  plugin_languages: yes
  plugin_languages_indepth: yes
  plugin_languages_sections: most-used, recently-used
  plugin_languages_details: lines, bytes-size
  plugin_languages_limit: 8
  # https://github.com/lowlighter/metrics/blob/master/source/plugins/activity/README.md
  # `push` is excluded from the filter: the activity plugin also
  # destructures payload.commits on PushEvents and would crash for the
  # same reason as habits. Remove `push` from this list if upstream
  # guards against missing commits.
  plugin_activity: yes
  plugin_activity_limit: 5
  plugin_activity_days: 14
  plugin_activity_filter: issue, pr, release, fork, review, ref/create, ref/delete, comment, wiki, star, member, public
  # https://github.com/lowlighter/metrics/blob/master/source/plugins/achievements/README.md
  plugin_achievements: yes
  plugin_achievements_display: detailed
  plugin_achievements_threshold: A
